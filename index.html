<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PilotGuard SmartWatch</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const T = {
      tr: {
        heartRate: 'Kalp Atış Hızı',
        normalRange: 'Normal aralık',
        stressLevel: 'Stres Seviyesi',
        level: 'Seviye',
        low: 'Düşük', medium: 'Orta', high: 'Yüksek',
        accuracy: '%93 Hassasiyet',
        sleepQuality: 'Uyku Kalitesi',
        quality: 'Kalite',
        totalSleep: 'Toplam uyku',
        totalSleepVal: '7s 32d',
        flightStatus: 'Uçuş Durumu',
        ready: 'Hazır',
        flightReady: 'Uçuşa Hazır', caution: 'Dikkatli', risk: 'Risk',
        aiAnalysis: 'AI Analiz: %87 doğru',
        recommendations: 'Öneriler',
        breathing: 'Nefes Egzersizi', breathingDesc: '10 dakika öneri',
        hydration: 'Hidrasyon', hydrationDesc: '2 bardak su',
        rest: 'Dinlenme', restDesc: '15 dk mola',
        readiness: 'Hazırlık',
        swipe: 'Kaydır →',
        controls: 'Sol tık: İleri • Sağ tık: Geri',
        locale: 'tr-TR',
      },
      en: {
        heartRate: 'Heart Rate',
        normalRange: 'Normal range',
        stressLevel: 'Stress Level',
        level: 'Level',
        low: 'Low', medium: 'Medium', high: 'High',
        accuracy: '93% Accuracy',
        sleepQuality: 'Sleep Quality',
        quality: 'Quality',
        totalSleep: 'Total sleep',
        totalSleepVal: '7h 32m',
        flightStatus: 'Flight Status',
        ready: 'Ready',
        flightReady: 'Flight Ready', caution: 'Caution', risk: 'Risk',
        aiAnalysis: 'AI Analysis: 87% accurate',
        recommendations: 'Recommendations',
        breathing: 'Breathing Exercise', breathingDesc: '10 min recommended',
        hydration: 'Hydration', hydrationDesc: '2 glasses of water',
        rest: 'Rest', restDesc: '15 min break',
        readiness: 'Readiness',
        swipe: 'Swipe →',
        controls: 'Left click: Next • Right click: Prev',
        locale: 'en-GB',
      }
    };

    const Heart = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>;
    const Activity = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const Moon = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
    const Plane = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2a1 1 0 0 0-.9.3L2.1 7.3a1 1 0 0 0 .2 1.5L9 12l-2 3H5l-1 1 3 2 2 3 1-1v-2l3-2 3.5 6.7a1 1 0 0 0 1.5.2l1.8-1.8a1 1 0 0 0 .3-.9z"></path></svg>;
    const AlertTriangle = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const ChevronLeft = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const ChevronRight = (p) => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||24} height={p.size||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={p.className}><polyline points="9 18 15 12 9 6"></polyline></svg>;

    const PilotGuardWatch = () => {
      const [currentScreen, setCurrentScreen] = useState('main');
      const [time, setTime] = useState(new Date());
      const [lang, setLang] = useState('tr');
      const [pilotData, setPilotData] = useState({
        heartRate: 72, hrv: 46, stressLevel: 3,
        sleepQuality: 85, flightReadiness: 72, batteryLevel: 85
      });

      const t = T[lang];

      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const interval = setInterval(() => {
          setPilotData(prev => ({
            ...prev,
            heartRate: Math.floor(Math.random() * 20) + 65,
            hrv: Math.floor(Math.random() * 10) + 40,
            stressLevel: Math.floor(Math.random() * 5) + 1,
            sleepQuality: Math.floor(Math.random() * 15) + 80,
            flightReadiness: Math.floor(Math.random() * 30) + 60
          }));
        }, 4000);
        return () => clearInterval(interval);
      }, []);

      const toggleLang = () => setLang(l => l === 'tr' ? 'en' : 'tr');

      const CircularProgress = ({ percentage, size=120, strokeWidth=8, color="#3B82F6", children }) => {
        const radius = (size - strokeWidth) / 2;
        const circumference = radius * 2 * Math.PI;
        const strokeDasharray = `${(percentage / 100) * circumference} ${circumference}`;
        return (
          <div className="relative inline-flex items-center justify-center">
            <svg width={size} height={size} className="transform -rotate-90">
              <circle cx={size/2} cy={size/2} r={radius} stroke="#E5E7EB" strokeWidth={strokeWidth} fill="transparent" />
              <circle cx={size/2} cy={size/2} r={radius} stroke={color} strokeWidth={strokeWidth} fill="transparent" strokeDasharray={strokeDasharray} strokeLinecap="round" className="transition-all duration-500" />
            </svg>
            <div className="absolute inset-0 flex items-center justify-center">{children}</div>
          </div>
        );
      };

      const screens = ['main','heart','stress','sleep','flight','alerts'];
      const currentIndex = screens.indexOf(currentScreen);
      const nextScreen = () => setCurrentScreen(screens[(currentIndex + 1) % screens.length]);
      const prevScreen = () => setCurrentScreen(screens[(currentIndex - 1 + screens.length) % screens.length]);

      const rc = pilotData.flightReadiness >= 80 ? "#10B981" : pilotData.flightReadiness >= 60 ? "#F59E0B" : "#EF4444";

      const stressLabel = pilotData.stressLevel <= 2 ? t.low : pilotData.stressLevel <= 4 ? t.medium : t.high;
      const flightLabel = pilotData.flightReadiness >= 80 ? t.flightReady : pilotData.flightReadiness >= 60 ? t.caution : t.risk;

      const renderScreen = () => {
        switch(currentScreen) {
          case 'heart': return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <Heart className="w-8 h-8 text-red-400 mb-2" /><div className="text-xs opacity-75 mb-4">{t.heartRate}</div>
              <CircularProgress percentage={(pilotData.heartRate/100)*100} size={120} color="#EF4444">
                <div className="text-center"><div className="text-xl font-bold">{pilotData.heartRate}</div><div className="text-xs opacity-75">BPM</div></div>
              </CircularProgress>
              <div className="mt-4 text-center"><div className="text-sm font-medium">HRV: {pilotData.hrv}ms</div><div className="text-xs opacity-75 mt-1">{t.normalRange}</div></div>
              <div className="absolute bottom-4 flex justify-between w-full px-4"><ChevronLeft className="w-4 h-4 opacity-50" /><ChevronRight className="w-4 h-4 opacity-50" /></div>
            </div>
          );
          case 'stress': return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <Activity className="w-8 h-8 text-orange-400 mb-2" /><div className="text-xs opacity-75 mb-4">{t.stressLevel}</div>
              <CircularProgress percentage={pilotData.stressLevel*20} size={120} color="#F59E0B">
                <div className="text-center"><div className="text-xl font-bold">{pilotData.stressLevel}</div><div className="text-xs opacity-75">{t.level}</div></div>
              </CircularProgress>
              <div className="mt-4 text-center"><div className="text-sm font-medium">{stressLabel}</div><div className="text-xs opacity-75 mt-1">{t.accuracy}</div></div>
              <div className="absolute bottom-4 flex justify-between w-full px-4"><ChevronLeft className="w-4 h-4 opacity-50" /><ChevronRight className="w-4 h-4 opacity-50" /></div>
            </div>
          );
          case 'sleep': return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <Moon className="w-8 h-8 text-purple-400 mb-2" /><div className="text-xs opacity-75 mb-4">{t.sleepQuality}</div>
              <CircularProgress percentage={pilotData.sleepQuality} size={120} color="#8B5CF6">
                <div className="text-center"><div className="text-xl font-bold">{pilotData.sleepQuality}%</div><div className="text-xs opacity-75">{t.quality}</div></div>
              </CircularProgress>
              <div className="mt-4 text-center"><div className="text-sm font-medium">{t.totalSleepVal}</div><div className="text-xs opacity-75 mt-1">{t.totalSleep}</div></div>
              <div className="absolute bottom-4 flex justify-between w-full px-4"><ChevronLeft className="w-4 h-4 opacity-50" /><ChevronRight className="w-4 h-4 opacity-50" /></div>
            </div>
          );
          case 'flight': return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <Plane className="w-8 h-8 text-blue-400 mb-2" /><div className="text-xs opacity-75 mb-4">{t.flightStatus}</div>
              <CircularProgress percentage={pilotData.flightReadiness} size={120} color={rc}>
                <div className="text-center"><div className="text-xl font-bold">{pilotData.flightReadiness}%</div><div className="text-xs opacity-75">{t.ready}</div></div>
              </CircularProgress>
              <div className="mt-4 text-center"><div className="text-sm font-medium">{flightLabel}</div><div className="text-xs opacity-75 mt-1">{t.aiAnalysis}</div></div>
              <div className="absolute bottom-4 flex justify-between w-full px-4"><ChevronLeft className="w-4 h-4 opacity-50" /><ChevronRight className="w-4 h-4 opacity-50" /></div>
            </div>
          );
          case 'alerts': return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <AlertTriangle className="w-8 h-8 text-yellow-400 mb-2" /><div className="text-xs opacity-75 mb-4">{t.recommendations}</div>
              <div className="text-center space-y-2">
                <div className="bg-white bg-opacity-10 rounded-lg p-2"><div className="text-sm font-medium">{t.breathing}</div><div className="text-xs opacity-75">{t.breathingDesc}</div></div>
                <div className="bg-white bg-opacity-10 rounded-lg p-2"><div className="text-sm font-medium">{t.hydration}</div><div className="text-xs opacity-75">{t.hydrationDesc}</div></div>
                <div className="bg-white bg-opacity-10 rounded-lg p-2"><div className="text-sm font-medium">{t.rest}</div><div className="text-xs opacity-75">{t.restDesc}</div></div>
              </div>
              <div className="absolute bottom-4 flex justify-between w-full px-4"><ChevronLeft className="w-4 h-4 opacity-50" /><ChevronRight className="w-4 h-4 opacity-50" /></div>
            </div>
          );
          default: return (
            <div className="flex flex-col items-center justify-center h-full text-white">
              <div className="text-center mb-4">
                <div className="text-2xl font-mono font-bold">{time.toLocaleTimeString(t.locale,{hour:'2-digit',minute:'2-digit'})}</div>
                <div className="text-xs opacity-75">{time.toLocaleDateString(t.locale,{day:'2-digit',month:'short'})}</div>
              </div>
              <CircularProgress percentage={pilotData.flightReadiness} size={140} strokeWidth={6} color={rc}>
                <div className="text-center"><div className="text-2xl font-bold">{pilotData.flightReadiness}%</div><div className="text-xs opacity-75">{t.readiness}</div><div className="text-xs opacity-40 mt-1">{t.swipe}</div></div>
              </CircularProgress>
              <div className="grid grid-cols-3 gap-3 mt-4 text-center">
                <div className="flex flex-col items-center"><Heart className="w-4 h-4 text-red-400 mb-1" /><div className="text-xs font-medium">{pilotData.heartRate}</div></div>
                <div className="flex flex-col items-center"><Activity className="w-4 h-4 text-orange-400 mb-1" /><div className="text-xs font-medium">{pilotData.stressLevel}</div></div>
                <div className="flex flex-col items-center"><Moon className="w-4 h-4 text-purple-400 mb-1" /><div className="text-xs font-medium">{pilotData.sleepQuality}%</div></div>
              </div>

            </div>
          );
        }
      };

      return (
        <div className="flex items-center justify-center min-h-screen bg-white p-8">

          {/* TR/EN Dil Butonu */}
          <button
            onClick={toggleLang}
            style={{
              position: 'fixed', top: '16px', right: '16px',
              background: '#1f2937',
              border: '1px solid #374151',
              color: '#f9fafb', borderRadius: '6px',
              padding: '4px 12px', fontSize: '12px',
              fontFamily: 'monospace', letterSpacing: '1px',
              cursor: 'pointer', zIndex: 1000
            }}
          >
            {lang === 'tr' ? 'EN' : 'TR'}
          </button>

          <div style={{position:'relative'}}>
            <div style={{width:300,height:300,borderRadius:'50%',background:'linear-gradient(135deg,#374151,#111827)',padding:18,boxShadow:'0 20px 60px rgba(0,0,0,0.35)'}}>
              <div onClick={nextScreen} onContextMenu={(e)=>{e.preventDefault();prevScreen();}} style={{width:'100%',height:'100%',borderRadius:'50%',background:'linear-gradient(135deg,#111827,#000)',position:'relative',overflow:'hidden',cursor:'pointer',userSelect:'none'}}>
                <div style={{position:'absolute',inset:8,borderRadius:'50%',background:'linear-gradient(135deg,#1f2937,#111827)'}}>{renderScreen()}</div>
                <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'linear-gradient(135deg,rgba(255,255,255,0.08),transparent)',pointerEvents:'none'}}/>
              </div>
            </div>
            <div style={{position:'absolute',right:-2,top:'50%',transform:'translateY(-50%)',width:6,height:28,background:'#6b7280',borderRadius:'0 4px 4px 0',boxShadow:'1px 0 3px rgba(0,0,0,0.3)'}}/>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PilotGuardWatch />);
  </script>
</body>
</html>
